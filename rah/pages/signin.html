<!DOCTYPE html>
<html>
    <head>
        <title>Sign In</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav class="top-nav">
            <a href="index.html" class="nav-logo" aria-label="Uni Chat home">
                <img src="/elements/Uni-Chat-Logo.png" alt="Uni Chat logo" class="nav-logo-img">
            </a>
            <a href="chat.html" class="nav-chat-btn">Chat</a>
            <a href="delete-accounts.html" id="nav-admin" class="nav-admin-btn" style="display:none">Admin</a>
            <a href="signup.html" class="nav-signup-btn">Sign Up</a>
            <a href="profile.html" id="nav-profile" style="display:none">
                <img id="nav-profile-img" class="nav-profile-img" src="/default-avatar.svg" alt="Profile">
            </a>
        </nav>
        <h1>Sign In</h1>
        <form class="signup-form" id="signin-form">
            <input type="email" id="signin-email" placeholder="Email" required>
            <input type="password" id="signin-password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <p class="form-link">Don't have an account? <a href="signup.html" class="signup-access-link">Sign Up</a></p>
        <div class="invert-cursor" id="invert-cursor" aria-hidden="true"></div>
    </body>
    <script src="code.js"></script>
</html>
